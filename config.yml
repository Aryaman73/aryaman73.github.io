baseURL: https://aryaman73.github.io
languageCode: en-us
title: aryamans.me
theme: PaperMod

# TODO: should baseUrl this be aryamans.me?

params:
  # GoatCounter analytics (https://www.goatcounter.com). Set this to your site
  # code — the <code> in https://<code>.goatcounter.com. Leave empty to disable.
  # The script is injected via layouts/partials/extend_head.html and is skipped
  # during local `hugo server` previews. Dashboard: https://<code>.goatcounter.com
  goatCounterCode: "aryamans"

  # Default to dark mode (visitors can still toggle to light via the header
  # button). Without this, PaperMod follows the visitor's OS prefers-color-scheme.
  defaultTheme: dark

  # Don't list blog posts on the home page; they live at /posts/ (see "blog" nav
  # link). Pointing mainSections at a non-existent section empties the home list
  # without touching the theme. The /posts/ page lists all posts regardless.
  mainSections:
    - none

  homeInfoParams:
    Title: "Hey! \U0001F44B"
    Content: >
      - I'm Aryaman, a software developer based in Toronto! 🇨🇦 I recently graduated from the University of Waterloo's Computer Engineering program. 🎓

      -

      - I'm currently working at Ramp as a Software Engineer on the Authentication team.

      -

      - Previously, I interned at Tesla as a Software Engineer on the Firmware Build & Infrastructure team, where I contributed to large-scale infrastructure projects using TypeScript, Python, and Ruby, and at Amazon (AWS) on the AWS Identity team. I’ve also worked at Telus, PointClickCare, and Versett, creating accessible, reliable, and thoughtfully-designed applications with a focus on user experience.
      
      - 

      - Outside of work, you might know me as a mentor at HackTheNorth and StarterHacks or from volunteering with Midnight Sun, the Waterloo ECE Society, and the Waterloo Engineering Competition.
      
      - 

      - Feel free to reach out if you'd like to connect, collaborate, or just chat about all things software 🫠

  socialIcons:
    - name: GitHub
      url: "https://github.com/aryaman73"
    - name: LinkedIn
      url: "https://www.linkedin.com/in/aryamans/"
    - name: Dev
      url: "https://devpost.com/Aryaman73"
    - name: Email
      url: "mailto:a553sing@uwaterloo.ca"

